# Deploy EconoMonitor to Azure App Service
#
# Triggers on every push to 'main'.
# Also provides a manual trigger (workflow_dispatch) for on-demand deploys.
#
# ── One-time setup ──────────────────────────────────────────────────────────
#
# OIDC is already configured (federated credentials created on the service
# principal). No JSON credentials blob is needed.
#
# In your GitHub repo go to Settings → Secrets and variables → Actions
# and add these repository secrets:
#
#    Secret name               Value
#    ─────────────────────     ────────────────────────────────────────────────
#    AZURE_CLIENT_ID           b82f9fe7-92aa-4ed6-98b0-90dfb24fd535
#    AZURE_TENANT_ID           f33d7d7f-d7a8-49c9-9dfe-af8c9ca30123
#    AZURE_SUBSCRIPTION_ID     4b2df633-d9f8-4261-adf9-226dd6f19033
#    FRED_API_KEY              Your FRED API key
#    FRASER_API_KEY            Your FRASER API key
#    GITHUB_TOKEN_AI           Your GitHub PAT (for Models API / AI features)
#
# ── App info (edit if you rename the Azure resources) ───────────────────────

name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME:      economonitor
  AZURE_RESOURCE_GROUP:   rg-economonitor
  NODE_VERSION:           "22.x"

permissions:
  contents: read
  id-token: write   # required for OIDC login

jobs:
  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application (standalone mode)
        env:
          NODE_ENV: production
        run: npm run build

      # next.config.ts has output: "standalone", which produces a self-contained
      # server in .next/standalone (~37 MB) instead of shipping all of node_modules.
      # Static assets and public/ must be copied in before zipping.
      - name: Assemble standalone bundle
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public        .next/standalone/public

      - name: Create deployment package
        run: |
          cd .next/standalone
          zip -r ../../deploy.zip .
          cd ../..
          echo "deploy.zip size: $(du -sh deploy.zip | cut -f1)"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: deploy.zip
          retention-days: 3

  # ── Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-package

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name:  ${{ env.AZURE_WEBAPP_NAME }}
          package:   deploy.zip

      # Keep runtime secrets in sync with what's in GitHub Secrets.
      # Remove or comment out this step if you manage App Settings manually.
      - name: Sync App Settings
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp config appsettings set \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --settings \
                NODE_ENV=production \
                FRED_API_KEY="${{ secrets.FRED_API_KEY }}" \
                FRASER_API_KEY="${{ secrets.FRASER_API_KEY }}" \
                GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN_AI }}"

  # ── Validate ──────────────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for app to warm up
        run: sleep 20

      - name: Check homepage returns HTTP 200
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            --max-time 30 \
            "https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net")
          echo "Homepage status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Check AI chat endpoint
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            --max-time 30 \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"messages":[{"role":"user","content":"What is GDP?"}]}' \
            "https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/ai/chat")
          echo "Chat API status: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "206" ] || exit 1

      - name: Deployment summary
        run: |
          echo "✅ EconoMonitor deployed successfully"
          echo "🌐 URL: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
