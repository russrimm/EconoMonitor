# Deploy EconoMonitor to Azure App Service
#
# Triggers on every push to 'main'.
# Also provides a manual trigger (workflow_dispatch) for on-demand deploys.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   AZURE_WEBAPP_PUBLISH_PROFILE  – XML publish profile from App Service
#   FRED_API_KEY                  – FRED Data API key
#   FRASER_API_KEY                – FRASER API key
#   GITHUB_TOKEN_AI               – GitHub PAT for the Models API (AI features)
#
# App Service configuration (must match your Azure resources):
#   AZURE_WEBAPP_NAME: economonitor
#   NODE_VERSION:      20.x

name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: economonitor   # change if your app name differs
  NODE_VERSION: "20.x"

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        env:
          # Expose any build-time env vars here (none currently needed for Next.js)
          NODE_ENV: production
        run: npm run build

      # Package everything Azure needs to run the app.
      # .next/ contains the compiled output; node_modules are installed on Azure
      # by Oryx after deployment, so we omit them here to keep the zip small.
      - name: Create deployment package
        run: |
          zip -r deploy.zip \
            .next \
            public \
            package.json \
            package-lock.json \
            next.config.ts

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: deploy.zip
          retention-days: 3

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-package

      - name: Deploy to Azure Web Apps
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip

      # Sync runtime App Settings so secrets are always up to date.
      # This step is optional if you manage settings only through the portal/CLI.
      - name: Sync App Settings via Azure CLI
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp config appsettings set \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group rg-economonitor \
              --settings \
                NODE_ENV=production \
                FRED_API_KEY="${{ secrets.FRED_API_KEY }}" \
                FRASER_API_KEY="${{ secrets.FRASER_API_KEY }}" \
                GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN_AI }}"
        # This step requires az login credentials. It's easiest to remove this
        # step and manage App Settings once via the portal or CLI manually.
        # To enable it, replace with azure/login@v2 + service principal first.
        continue-on-error: true

  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for app to warm up
        run: sleep 20

      - name: Check homepage returns HTTP 200
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            --max-time 30 \
            "https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net")
          echo "Homepage status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Check AI chat endpoint
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            --max-time 30 \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"messages":[{"role":"user","content":"What is GDP?"}]}' \
            "https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/ai/chat")
          echo "Chat API status: $STATUS"
          # 200 = success, 500 = server error with AI key missing
          [ "$STATUS" = "200" ] || [ "$STATUS" = "206" ] || exit 1

      - name: Deployment summary
        run: |
          echo "✅ EconoMonitor deployed successfully"
          echo "🌐 URL: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
